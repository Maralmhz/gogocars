<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema Suspenso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 30px;
      max-width: 480px;
      background: #16213e;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid #0f3460;
    }
    .logo {
      width: 140px;
      margin-bottom: 28px;
      border-radius: 12px;
    }
    .icon-warning {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.5rem;
      color: #e94560;
      margin-bottom: 12px;
    }
    p {
      font-size: 1rem;
      color: #a8b2c1;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: #25D366;
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-whatsapp:hover { background-color: #1ebe5d; }
    .btn-whatsapp img {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Logo" class="logo" />
    <div class="icon-warning">⚠️</div>
    <h1>Sistema Temporariamente Suspenso</h1>
    <p>O acesso a este sistema está temporariamente indisponível.<br/>Entre em contato para regularizar e reativar o acesso.</p>
    <a href="https://wa.me/5531996766963" target="_blank" class="btn-whatsapp">
      <img src="whatsapp.png" alt="WhatsApp" />
      Falar no WhatsApp
    </a>
  </div>
</body>
</html>
